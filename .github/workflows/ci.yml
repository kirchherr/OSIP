name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test, lint, typecheck, and contracts
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: packages/osip:packages/bus:packages/context_engine:packages/profiles:packages/decision_runtime:packages/safety:packages/benchmarks:packages/simulators:packages/gateway:packages/sdk_python
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Check environment
        run: uv run python scripts/dev_env_check.py

      - name: Run tests
        run: uv run pytest

      - name: Run lint
        run: uv run ruff check .

      - name: Run typecheck
        run: uv run mypy

      - name: Verify OSIP JSON Schema export
        run: |
          uv run python scripts/export_osip_schemas.py
          git diff --exit-code protocols/schemas

      - name: Verify OpenAPI export
        run: |
          uv run python scripts/export_openapi.py
          git diff --exit-code protocols/openapi

      - name: Verify AsyncAPI export
        run: |
          uv run python scripts/export_asyncapi.py
          git diff --exit-code protocols/asyncapi

      - name: Run deterministic benchmark
        run: |
          uv run python scripts/run_benchmark.py \
            --json-output /tmp/osip-benchmark.json \
            --markdown-output /tmp/osip-benchmark.md
